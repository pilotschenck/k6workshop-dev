<section data-markdown>
<textarea data-template>
## The Scenario

Your team shipped a new checkout feature. Before going live, you need to:

1. Validate it performs correctly under load
2. Set up continuous synthetic monitoring
3. Define an SLO to measure reliability over time
4. Configure alerts so right people are paged if SLO at risk

**Target:** Demo-app checkout flow
```
GET /api/products → POST /login → POST /checkout
```

<aside class="notes">
This mirrors the implementation you'd do for a production service on your first week with Grafana stack.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## What You'll Build

Complete observability stack:
- Load test with stages, groups, thresholds, custom metrics
- Live visualization in Grafana dashboard
- SM scripted check for continuous monitoring
- Grafana SLO with error budget tracking
- Burn rate alerts wired to contact points

<aside class="notes">
By the end, you'll understand exactly where each piece lives in Grafana and how it connects.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
<!-- .slide: class="dense-content" -->
## Phase 1: Load Test the Checkout Flow

Requirements:
- **Groups:** browse, authenticate, checkout
- **Checks** on every response
- **Token passing:** extract from login, use in checkout
- **Thresholds:**
  - `http_req_duration{group:::browse}: p(95)<500`
  - `http_req_duration{group:::authenticate}: p(95)<500`
  - `http_req_duration{group:::checkout}: p(95)<500`
  - `http_req_failed: rate<0.01`
  - `checkout_success: rate>0.99`
- **Custom metrics:** Counter `orders_placed`, Rate `checkout_success`

<aside class="notes">
Groups appear separately in Grafana dashboard — makes it easy to see which phase has latency.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## Script Structure

```javascript
import http from 'k6/http';
import { check, group, sleep } from 'k6';
import { Counter, Rate } from 'k6/metrics';

const ordersPlaced = new Counter('orders_placed');
const checkoutSuccess = new Rate('checkout_success');

export const options = {
  stages: [
    { duration: '30s', target: 5 },
    { duration: '2m', target: 5 },
    { duration: '30s', target: 0 },
  ],
  thresholds: {
    'http_req_duration{group:::checkout}': ['p(95)<500'],
    'checkout_success': ['rate>0.99'],
  },
};
```

<aside class="notes">
Stages ramp to 5 VUs, sustain for 2 minutes, ramp down. Thresholds enforce business SLOs in CI.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## Default Function with Groups

```javascript
export default function () {
  group('browse', () => {
    const res = http.get('http://localhost:3000/api/products');
    check(res, { 'products status 200': (r) => r.status === 200 });
  });

  group('authenticate', () => {
    const loginRes = http.post('http://localhost:3000/login', payload);
    check(loginRes, { 'login status 200': (r) => r.status === 200 });
    const token = JSON.parse(loginRes.body).token;
  });

  group('checkout', () => {
    const checkoutRes = http.post('http://localhost:3000/checkout', data);
    if (checkoutRes.status === 201) {
      ordersPlaced.add(1);
      checkoutSuccess.add(true);
    }
  });

  sleep(1);
}
```

<aside class="notes">
Don't let failed login silently break checkout step — check every response.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## Phase 2: Set Up Synthetic Monitoring

Adapt load test script for SM:
1. Copy to new file: `lab-29-sm-check.js`
2. Remove `export const options` block
3. Point to staging URL or use private probe for localhost
4. Keep all checks and groups

SM calls default function once per probe execution (not looped).

<aside class="notes">
For production deployment, use staging URL SM probes can reach. For workshop, configure private probe or use httpbin.org as stand-in.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## Uploading to SM

Testing & synthetics → Synthetics → Checks → + Create new check → Scripted

```yaml
Job name: Checkout Flow
Target: http://localhost:3000 (or staging URL)
Frequency: 5 minutes
Probes: 3 locations (US East, EU West, AP Singapore)
Labels: service=checkout, env=prod, team=backend
```

Verify check runs successfully within 5 minutes.

<aside class="notes">
If using private probe from Lab 25: deselect public probes, select private probe, target localhost:3000.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## Adding HTTP Availability Check

Alongside scripted check, create lightweight HTTP check:

```yaml
Check type: HTTP
Target: http://localhost:3000/health
Job name: Checkout Service Health
Frequency: 1 minute (faster than scripted check)
Probes: same 3 locations
Expected status: 200
```

<aside class="notes">
Two complementary checks: deep scripted check every 5 min validates full flow; lightweight health check every 1 min gives faster outage signal.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## Phase 3: Define an SLO

SM → SLOs → Create SLO

```yaml
Name: Checkout Flow SLO
Description: 99.5% of checkout checks succeed over 7-day window
SLI type: Success rate
Check: Checkout Flow scripted check
Target: 99.5%
Rolling window: 7 days
```

Grafana auto-calculates error budget: ~50 minutes allowable failure per week.

<aside class="notes">
After saving, SM shows current status, error budget remaining, burn rate graph, and compliance history.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## SLO Dashboard

View automatically generated dashboard:
- **Current status** badge (In budget / Breach risk / Breached)
- **Error budget remaining** (percentage and minutes/hours)
- **Burn rate graph** (current vs 1× baseline)
- **SLO compliance chart** (historical green/red areas)

<aside class="notes">
Error budget remaining is most actionable number — tells you how much runway you have.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## Phase 4: Configure Alerting

Add burn rate alerts to SLO:

**Fast burn (page-worthy):**
```yaml
Burn rate: 14×
Window: 5 minutes
Severity: critical
```
At 14×, 7-day budget exhausted in ~12 hours

**Slow burn (ticket-worthy):**
```yaml
Burn rate: 2×
Window: 1 hour
Severity: warning
```
At 2×, budget exhausted in ~3.5 days

<aside class="notes">
Fast burn warrants immediate investigation. Slow burn warrants reliability investigation before budget runs out.
</aside>
</textarea>
</section>

## Verify Contact Point

Alerting → Contact Points

1. Verify contact point from Lab 22 still configured
2. Click **Test** to send test notification
3. Ensure Notification Policy routes `severity=critical` to contact point

</aside>

## The Full Picture Comparison

| What You Built | k6 / Grafana | DataDog Equivalent |
|---|---|---|
| Load test | k6 local run with stages, groups | DD Synthetic Load Testing |
| Scripted monitor | SM Scripted Check (k6 JS) | DD Multistep API Test |
| Availability check | SM HTTP Check | DD Synthetic API Test |
| SLO | Grafana SM SLO | DD SLO |
| Burn rate alert | Grafana Alert Rule (auto-generated) | DD SLO alert |
| Notification routing | Notification Policy (label-based) | Monitor message @-handles |
| Dashboard | Grafana (auto-generated from SM) | DD Dashboard |

<aside class="notes">
All in one platform: Grafana Cloud unifies load testing, synthetic monitoring, SLOs, alerting. Same platform, integrated workflow.
</aside>
</textarea>

<section data-markdown>
<textarea data-template>
## One Language, Three Use Cases

k6 JavaScript powers:
1. **Local load testing** — stages, thresholds, custom metrics
2. **SM scripted checks** — continuous synthetic monitoring
3. **SM browser checks** — UI validation

No separate language or format for each use case.

<aside class="notes">
This is the key insight: learn k6 once, use it for load testing, scripted checks, and browser checks. No context switching.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## One Platform, All Signals

Grafana unifies:
- Load test results (InfluxDB → Grafana dashboard)
- Synthetic monitoring status and history
- SLO error budget tracking
- Alert rules and notification routing
- Logs (Loki), traces (Tempo), metrics (Mimir)

<aside class="notes">
Same mental model everywhere: check → SLO → alert applies to synthetics, metrics, logs, traces.
</aside>
</textarea>
</section>

<section data-markdown>
<textarea data-template>
## One Mental Model

The pattern applies everywhere:

**Check** → passing check is a probe_success=1 data point

**SLO** → defines how many failures are acceptable over time

**Alert** → burn rate tells you when failing too fast

<aside class="notes">
This is the same model DataDog uses, just implemented with open standards and open-source tooling.
</aside>
</textarea>
</section>

## Key Architectural Advantages

Open-source core:
- k6 OSS is free forever for local execution
- All test scripts are plain JavaScript files you own
- No vendor lock-in on test format

Unified observability:
- Same platform for metrics, logs, traces, synthetics
- Single query language (PromQL) across all metrics
- Notification Policies decouple routing from rules
