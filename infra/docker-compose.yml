networks:
  k6workshop:
    driver: bridge

services:

  demo-app:
    build: ./apps/demo-app
    ports:
      - "3000:3000"
    networks:
      - k6workshop
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  broken-app:
    build: ./apps/broken-app
    ports:
      - "3001:3000"
    networks:
      - k6workshop
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  httpbin:
    image: kennethreitz/httpbin
    ports:
      - "8080:80"
    networks:
      - k6workshop
    restart: unless-stopped

  wiremock:
    image: wiremock/wiremock:3.3.1
    ports:
      - "8888:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings
    networks:
      - k6workshop
    restart: unless-stopped

  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - ./influxdb/init.iql:/docker-entrypoint-initdb.d/init.iql
    networks:
      - k6workshop
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3030:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      - k6workshop
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - k6workshop
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    volumes:
      - ./otel-collector/otel-config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - k6workshop
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.56
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - k6workshop
    restart: unless-stopped

  ws-echo:
    build: ./apps/ws-echo
    ports:
      - "8765:8080"
    networks:
      - k6workshop
    restart: unless-stopped

  fake-dd-agent:
    build: ./apps/fake-datadog-agent
    ports:
      - "8125:8125/udp"
      - "8126:8126"
    networks:
      - k6workshop
    restart: unless-stopped
