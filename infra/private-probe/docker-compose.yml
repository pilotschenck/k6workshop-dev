# Reference configuration for running a Grafana private synthetic monitoring probe locally.
# Used in Lab 25. Requires a real Grafana Cloud account with Synthetic Monitoring enabled.
# Obtain SM_ACCESS_TOKEN from: Grafana Cloud > Testing & synthetics > Synthetics > Probes > Add Private Probe

version: "3.8"

services:
  private-probe:
    image: grafana/synthetic-monitoring-agent:latest
    # The agent reads configuration from CLI flags, NOT environment variables.
    # Passing SM_ACCESS_TOKEN / SM_API_SERVER_ADDRESS as environment vars silently
    # does nothing and the agent logs "invalid API token" on every poll.
    command:
      # Paste your probe's API token (Probe setup modal → Copy button next to API_TOKEN).
      - -api-token=<your-sm-access-token>
      # REGION-SPECIFIC gRPC endpoint (Probe setup modal → Copy button next to API_SERVER).
      # Example: synthetic-monitoring-grpc-us-west-0.grafana.net:443
      # Do NOT use the old generic URL (https://synthetic-monitoring-api.grafana.net);
      # it's neither the right protocol (HTTP vs gRPC) nor the right region.
      - -api-server-address=<region-specific-grpc-endpoint>:443
    networks:
      - k6workshop
    restart: unless-stopped

# The probe must share a Docker network with demo-app so it can reach it by hostname.
# The main infra compose project creates `infra_k6workshop`; we attach to it as external.
networks:
  k6workshop:
    name: infra_k6workshop
    external: true
