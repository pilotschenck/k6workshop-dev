# Reference configuration for running a Grafana private synthetic monitoring probe locally.
# Used in Lab 25. Requires a real Grafana Cloud account with Synthetic Monitoring enabled.
# Obtain SM_ACCESS_TOKEN from: Grafana Cloud > Synthetic Monitoring > Probes > Add Private Probe

version: "3.8"

services:
  private-probe:
    image: grafana/synthetic-monitoring-agent:latest
    environment:
      # Token obtained from Grafana Cloud Synthetic Monitoring plugin when registering a private probe.
      SM_ACCESS_TOKEN: "<your-sm-access-token>"
      # API server address for your Grafana Cloud stack's Synthetic Monitoring service.
      SM_API_SERVER_ADDRESS: "https://synthetic-monitoring-api.grafana.net"
    restart: unless-stopped
